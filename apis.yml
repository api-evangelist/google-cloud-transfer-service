apis:
  - name: Storage Transfer API
    description: >-
      The Storage Transfer API provides programmatic access to Google Cloud Storage Transfer Service for creating,
      managing, and monitoring data transfer jobs between cloud storage systems and on-premises storage. Developers can
      use the API to schedule transfers, configure transfer options, manage agent pools for on-premises transfers, and
      monitor transfer operation status and progress.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cloud.google.com/storage-transfer/docs
    baseURL: https://storagetransfer.googleapis.com
