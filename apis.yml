name: Google Cloud Transfer Service
description: >-
  Google Cloud Storage Transfer Service enables seamless data movement across object and file storage systems, including
  transfers from Amazon S3, Azure Blob Storage, or Cloud Storage to Cloud Storage, and from on-premises storage to Cloud
  Storage. It is optimized for large-scale transfers involving terabytes or petabytes of data.
