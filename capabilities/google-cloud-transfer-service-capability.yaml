        required: true
      - name: filter
        type: string
        description: JSON filter for operations
        required: true
      - name: pageSize
        type: integer
        description: pageSize
      - name: pageToken
        type: string
        description: pageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: listagentpools
      description: Google Cloud Transfer Service List agent pools
      hints:
        readOnly: true
