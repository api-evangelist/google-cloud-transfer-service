      - type: object
        mapping: $.
    - name: updatetransferjob
      description: Google Cloud Transfer Service Update a transfer job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-cloud-transfer-service.updatetransferjob
      with:
        jobName: tools.jobName
      inputParameters:
      - name: jobName
        type: string
        description: jobName
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: runtransferjob
      description: Google Cloud Transfer Service Run a transfer job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-cloud-transfer-service.runtransferjob
      with:
        jobName: tools.jobName
      inputParameters:
      - name: jobName
        type: string
        description: jobName
        required: true
      outputParameters:
      - type: object
